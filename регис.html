<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="icon" href="IMGG/logo3.png" type="image/png">
    <link rel="shortcut icon" href="IMGG/logo3.png" type="image/png">
</head>
<body>
    <div class="container">
        <div id="registration-form" class="form">

            <!-- Блок с логотипом -->
            <div class="logo-wrapper">
                <img src="IMGG/logo3.png" alt="Логотип компании">
            </div>

            <h2>Регистрация</h2>
            <div class="subhead">Создайте новый аккаунт</div>
            
            <form id="reg-form">
                <label for="lastName">Фамилия:</label>
                <input id="lastName" name="lastName" type="text" required placeholder="Введите фамилию">

                <label for="firstName">Имя:</label>
                <input id="firstName" name="firstName" type="text" required placeholder="Введите имя">

                <label for="middleName">Отчество:</label>
                <input id="middleName" name="middleName" type="text" placeholder="Введите отчество (необязательно)">

                <label for="phone">Номер телефона:</label>
                <input id="phone" name="phone" type="tel" required placeholder="+7 (___) ___-__-__">

                <label for="email">Почта:</label>
                <input id="email" name="email" type="email" required placeholder="example@mail.ru">

                <label for="position">Должность:</label>
                <input id="position" name="position" type="text" required placeholder="Ваша должность">

                <label for="employeeId">ID сотрудника:</label>
                <input id="employeeId" name="employeeId" type="text" required placeholder="Например: EMP-1234">

                <label for="password">Пароль:</label>
                <input id="password" name="password" type="password" required placeholder="Придумайте пароль">

                <button type="submit">Зарегистрироваться</button>
            </form>
            <p><a href="авто.html">Уже зарегистрированы? Войти</a></p>
        </div>
    </div>
    <script src="JS/main.js"></script>
</body>
</html>
